# Sourcelin Cloud Blog Nginx 部署模板
# 适用：前台与后台分域名部署（推荐）
# - 前台：blog.example.com
# - 后台：admin.example.com
# 网关地址：127.0.0.1:8080

worker_processes auto;

events {
    worker_connections 10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    # WebSocket 连接升级
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream sourcelin_gateway {
        server 127.0.0.1:8080;
        keepalive 64;
    }

    # ------------------------------
    # 后台管理：admin.example.com
    # ------------------------------
    server {
        listen 80;
        server_name admin.example.com;

        # 改为你的后台构建产物目录（sourcelin-ui-admin/dist）
        root  /opt/sourcelin/admin-dist;
        index index.html;

        # Vue SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 后台 API：/prod-api/** -> 网关 /**
        location /prod-api/ {
            rewrite ^/prod-api/(.*)$ /$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 文件服务（按你项目前端约定保留 /file 前缀）
        location /file/ {
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 禁止外部访问 actuator
        location ~* ^/(.*/)?actuator(/|$) {
            return 403;
        }
    }

    # ------------------------------
    # 博客前台：blog.example.com
    # ------------------------------
    server {
        listen 80;
        server_name blog.example.com;

        # 改为你的前台构建产物目录（sourcelin-ui-platform/dist）
        root  /opt/sourcelin/platform-dist;
        index index.html;

        # Vue SPA
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 前台 API 特殊规则（对齐前台 Vite 开发代理逻辑）
        # /blog-api/front/** -> /blog/front/**
        location /blog-api/front/ {
            rewrite ^/blog-api/front/(.*)$ /blog/front/$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # /blog-api/app/** -> /blog/app/**
        location /blog-api/app/ {
            rewrite ^/blog-api/app/(.*)$ /blog/app/$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 其余 /blog-api/** -> /**
        location /blog-api/ {
            rewrite ^/blog-api/(.*)$ /$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 文件服务
        location /file/ {
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* ^/(.*/)?actuator(/|$) {
            return 403;
        }
    }
}

