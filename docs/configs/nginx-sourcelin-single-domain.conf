# Sourcelin Cloud Blog 单域名部署模板
# 模式：同一域名下部署前台 + 后台
# - 前台：/
# - 后台：/admin/
#
# 关键前提（必须）：
# 后台 sourcelin-ui-admin 构建时要使用 base=/admin/
# 示例：vite build --base=/admin/
# 否则后台静态资源会请求到根路径，导致与前台资源冲突。

worker_processes auto;

events {
    worker_connections 10240;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream sourcelin_gateway {
        server 127.0.0.1:8080;
        keepalive 64;
    }

    server {
        listen 80;
        server_name sourcelin.cn www.sourcelin.cn;

        # ---------- 前台静态站点 ----------
        # 改成你的前台构建产物目录（默认 outDir: sourcelin-ui-platform）
        root  /opt/sourcelin/sourcelin-ui-platform;
        index index.html;

        # ---------- 后台静态站点 ----------
        # 访问 /admin 时补全斜杠
        location = /admin {
            return 301 /admin/;
        }

        # /admin/** -> 后台 dist
        location ^~ /admin/ {
            # 改成你的后台构建产物目录（默认 outDir: sourcelin-ui-admin）
            alias /opt/sourcelin/sourcelin-ui-admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # ---------- 前台 SPA ----------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---------- API 转发 ----------
        # 后台 API：/prod-api/** -> 网关 /**
        location /prod-api/ {
            rewrite ^/prod-api/(.*)$ /$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 前台 API 特殊规则（对齐前台 Vite 代理）
        # /blog-api/front/** -> /blog/front/**
        location /blog-api/front/ {
            rewrite ^/blog-api/front/(.*)$ /blog/front/$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # /blog-api/app/** -> /blog/app/**
        location /blog-api/app/ {
            rewrite ^/blog-api/app/(.*)$ /blog/app/$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 其余 /blog-api/** -> /**
        location /blog-api/ {
            rewrite ^/blog-api/(.*)$ /$1 break;
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # 文件服务
        location /file/ {
            proxy_pass http://sourcelin_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 禁止外部访问 actuator
        location ~* ^/(.*/)?actuator(/|$) {
            return 403;
        }
    }
}
