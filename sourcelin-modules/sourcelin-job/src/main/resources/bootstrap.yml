# Tomcat
server:
  port: 9203

# Spring
spring: 
  application:
    # 应用名称
    name: sourcelin-job
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      discovery:
        # 分组
        group: BLOG_GROUP
        # 服务注册地址
        server-addr: 127.0.0.1:8848
      config:
        # 分组
        group: BLOG_GROUP
        # 配置中心地址
        server-addr: 127.0.0.1:8848
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - data-id: application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
            group: ${spring.cloud.nacos.config.group}
